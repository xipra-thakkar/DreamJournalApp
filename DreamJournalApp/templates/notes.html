<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="../static/notes.css">
    <title>Notes</title>
</head>
<body>
    <nav>
        <div class="nav-div">
            <div class="nav-logo">
                <a class="navbar-brand nav-link" href="/"><img class="logo" src="../static/images/logo.png">Dream Journal</a>
            </div>
            <div class="nav-side">
                <a class="nav-link active nav-item-side" aria-current="page" href="/">Home</a>
                <a class="nav-link nav-item-side" href="log-out">Log Out</a>
            </div>
        </div>
    </nav>
    
    <div class="container mt-4">
        <h1>Notes</h1>

        <!-- Search Section -->
        <div class="mb-4">
            <input type="text" id="search" class="form-control" placeholder="Search by title, tags or content" onkeyup="searchNotes()">
        </div>

        <!-- Note Form -->
        <form method="post" id="note-form">
            <input type="text" name="note-title" id="note-title" class="form-control mb-2" placeholder="Note Title" required>

            <!-- Formatting Buttons -->
            <div class="mb-2">
                <button type="button" onclick="formatText('bold')" class="btn btn-outline-dark btn-sm"><b>B</b></button>
                <button type="button" onclick="formatText('italic')" class="btn btn-outline-dark btn-sm"><i>I</i></button>
                <button type="button" onclick="formatText('underline')" class="btn btn-outline-dark btn-sm"><u>U</u></button>
            </div>

            <!-- Replace textarea with contenteditable div -->
            <div id="note-content" class="form-control mb-2" contenteditable="true" placeholder="Write your note..." style="min-height: 150px;"></div>


            <!-- Tag Input -->
            <input type="text" name="tags" id="note-tags" class="form-control mb-3" placeholder="How are you feeling? (e.g. happy, sad)">
            <button type="submit" class="btn btn-primary">Add Note</button>
        </form>

        <!-- Notes List -->
        <ul class="list-group list-group-flush mt-4" id="notes">
            {% for note in user.notes %}
            <li class="list-group-item" id="note-{{note.id}}">
                <strong>{{ note.title }}</strong><br>
                <span>{{ note.content }}</span><br>
                <small class="text-muted">Tags: {{ note.tags }}</small><br>
                <button class="btn btn-danger btn-sm" onclick="deleteNote({{ note.id }}, event)">Delete</button>
                <button class="btn btn-primary btn-sm" onclick="editNoteForm({{ note.id }}, event)">Edit</button>
            </li><br/>
            {% endfor %}
        </ul>

        <!-- Edit Note Modal -->
        <div id="edit-form" class="modal" style="display:none;">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">Edit Note</h5>
                        <button type="button" class="btn-close" onclick="cancelEdit()"></button>
                    </div>
                    <div class="modal-body">
                        <input type="text" id="edit-note-title" class="form-control mb-2">
                        <textarea id="edit-note-text" class="form-control mb-2"></textarea>
                        <input type="text" id="edit-note-tags" class="form-control" placeholder="Update Tags (e.g. happy, sad)">
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" onclick="cancelEdit()">Cancel</button>
                        <button type="button" class="btn btn-primary" onclick="saveEdit()">Save changes</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../static/notes.js"></script>
</body>
</html>
